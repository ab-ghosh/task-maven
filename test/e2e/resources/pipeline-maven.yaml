---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  labels:
    name: task-maven
  name: task-maven
spec:
  workspaces:
    - name: source
      optional: false
    - name: server_secret
      optional: true
    - name: proxy_secret
      optional: true
    - name: proxy_configmap
      optional: true

  params:
    - name: URL
      type: string
    - name: REVISION
      type: string
    - name: VERBOSE
      type: string
    - name: ENV_VARS
      type: array
      default: []

  tasks:
    - name: git-clone
      taskRef:
        resolver: git
        params:
          - name: url
            value: https://github.com/openshift-pipelines/tektoncd-catalog
          - name: revision
            value: p
          - name: pathInRepo
            value: tasks/task-git-clone/0.3.0/task-git-clone.yaml
      workspaces:
        - name: output
          workspace: source
      params:
        - name: URL
          value: "$(params.URL)"
        - name: REVISION
          value: "$(params.REVISION)"
        - name: SUBMODULES
          value: "false"
        - name: VERBOSE
          value: "$(params.VERBOSE)"
        - name: SUBDIRECTORY
          value: $(context.pipelineRun.name)
    - name: maven
      taskRef:
        name: maven
      params:
        - name: GOALS
          value:
            - "validate"
        - name: SUBDIRECTORY
          value: $(context.pipelineRun.name)
        - name: ENV_VARS
          value: "$(params.ENV_VARS[*])"
      runAfter:
        - git-clone
      workspaces:
        - name: source
          workspace: source
        - name: server_secret
          workspace: server_secret
        - name: proxy_secret
          workspace: proxy_secret
        - name: proxy_configmap
          workspace: proxy_configmap
